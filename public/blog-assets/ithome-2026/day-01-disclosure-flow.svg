<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">漏洞資訊標準化流程</title>
  <desc id="desc">研究者、廠商與防禦團隊的資訊透過共同識別碼匯整，再連結到修補、盤點與風險排序。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131a"/>
      <stop offset="1" stop-color="#0b2022"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#65e6d4"/>
    </marker>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="20" fill="url(#bg)"/>
  <path d="M0 112H1200M0 562H1200" stroke="#173239"/>
  <g font-family="Inter, 'Noto Sans TC', sans-serif" letter-spacing="0">
    <text x="64" y="70" fill="#e8fbf8" font-size="30" font-weight="700">同一個漏洞，先對齊身分，再交換資訊</text>
    <text x="64" y="103" fill="#8aa9ad" font-size="18">標準化不是壓縮細節，而是建立所有資料都能引用的共同座標</text>

    <g fill="#10262d" stroke="#2d5660" stroke-width="2">
      <rect x="64" y="165" width="230" height="88" rx="8"/>
      <rect x="64" y="293" width="230" height="88" rx="8"/>
      <rect x="64" y="421" width="230" height="88" rx="8"/>
    </g>
    <g fill="#d9efed" font-size="22" font-weight="700">
      <text x="95" y="205">研究者報告</text>
      <text x="95" y="333">廠商公告</text>
      <text x="95" y="461">防禦端情資</text>
    </g>
    <g fill="#88a8ad" font-size="16">
      <text x="95" y="232">PoC、成因、重現條件</text>
      <text x="95" y="360">版本、影響、修補方式</text>
      <text x="95" y="488">利用狀態、資產關聯</text>
    </g>

    <g stroke="#65e6d4" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M294 209 C390 209 405 294 487 306"/>
      <path d="M294 337 H487"/>
      <path d="M294 465 C390 465 405 380 487 368"/>
    </g>

    <rect x="500" y="245" width="250" height="184" rx="12" fill="#0e3135" stroke="#65e6d4" stroke-width="3" filter="url(#glow)"/>
    <text x="625" y="300" fill="#8af7e8" font-size="18" text-anchor="middle">共同識別</text>
    <text x="625" y="352" fill="#ffffff" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="31" font-weight="700" text-anchor="middle">CVE-YYYY-NNNN</text>
    <text x="625" y="393" fill="#a7c2c1" font-size="16" text-anchor="middle">讓不同來源指向同一問題</text>

    <g stroke="#65e6d4" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M750 304 C828 304 836 217 904 217"/>
      <path d="M750 337 H904"/>
      <path d="M750 370 C828 370 836 457 904 457"/>
    </g>
    <g fill="#10262d" stroke="#2d5660" stroke-width="2">
      <rect x="906" y="173" width="230" height="88" rx="8"/>
      <rect x="906" y="293" width="230" height="88" rx="8"/>
      <rect x="906" y="413" width="230" height="88" rx="8"/>
    </g>
    <g fill="#d9efed" font-size="21" font-weight="700">
      <text x="937" y="214">修補追蹤</text>
      <text x="937" y="334">資產盤點</text>
      <text x="937" y="454">風險排序</text>
    </g>
    <g fill="#88a8ad" font-size="16">
      <text x="937" y="240">Advisory、更新版本</text>
      <text x="937" y="360">Scanner、SBOM</text>
      <text x="937" y="480">CVSS、EPSS、KEV</text>
    </g>
    <text x="64" y="620" fill="#5f8589" font-size="16">CVE 通報實務 30 天 · Day 1</text>
  </g>
</svg>
